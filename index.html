<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hollowmere</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap');

:root{
  --bg:#12100d;
  --panel:#1c1712;
  --panel2:#241d16;
  --line:#3a2f22;
  --parch:#d8c49c;
  --parch-dim:#a5926f;
  --gold:#c8963e;
  --gold-bright:#e8b968;
  --forest:#3f6b4a;
  --forest-dim:#2a4832;
  --blood:#8a3030;
  --blood-bright:#b34848;
  --sky:#4a7a8c;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--parch);font-family:'Spectral',serif;height:100%;}
body{
  background-image:
    radial-gradient(ellipse at top left, rgba(63,107,74,0.08), transparent 60%),
    radial-gradient(ellipse at bottom right, rgba(138,48,48,0.06), transparent 60%);
}
h1,h2,h3,.display{font-family:'Cinzel',serif;letter-spacing:0.03em;}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

#app{max-width:1180px;margin:0 auto;padding:18px 16px 60px;}

.masthead{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--line);padding-bottom:12px;margin-bottom:16px;}
.masthead h1{font-size:1.9rem;font-weight:900;color:var(--gold-bright);margin:0;text-shadow:0 0 18px rgba(200,150,62,0.25);}
.masthead .sub{color:var(--parch-dim);font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;}

.layout{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start;}
@media (max-width:820px){.layout{grid-template-columns:1fr;} .sidebar-col{position:static;max-height:none;}}

/* ---- Phone refinements (desktop/tablet layout above is untouched) ---- */
@media (max-width:600px){
  #app{padding:10px 10px 40px;}
  .masthead{flex-direction:column;align-items:flex-start;gap:6px;padding-bottom:10px;margin-bottom:12px;}
  .masthead > div{text-align:left;width:100%;display:flex;justify-content:space-between;align-items:center;}
  .masthead h1{font-size:1.5rem;}
  .card{padding:11px;}
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;margin-bottom:10px;}
  .tab{white-space:nowrap;flex:0 0 auto;padding:7px 11px;font-size:0.72rem;}
  .area-title{font-size:1.1rem;}
  .skill-grid{grid-template-columns:1fr 1fr;gap:6px 8px;}
  .skill{padding:5px 7px;}
  .node-grid, .travel-grid{grid-template-columns:1fr;}
  .recipe, .shop-item{flex-direction:column;align-items:stretch;gap:8px;}
  .recipe > div:first-child, .shop-item > div:first-child{width:100%;}
  .inv-actions{flex-wrap:wrap;}
  .fight-vs{flex-direction:column;gap:12px;}
  .fight-side{width:100%;}
  .monster-stats{flex-wrap:wrap;gap:8px 14px;}
  .btn{padding:8px 12px;}
  .btn.small{padding:6px 10px;}
  .modal-box{padding:14px;max-height:85vh;}
  .login-screen{margin:24px auto;}
  .login-screen h1{font-size:1.9rem;}
  .new-char-row{flex-direction:column;}
  .new-char-row input{width:100%;}
}
.sidebar-col{position:sticky;top:16px;max-height:calc(100vh - 32px);overflow-y:auto;}

.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:6px;padding:14px;position:relative;}
.card::before{content:'';position:absolute;inset:0;border-radius:6px;border:1px solid rgba(200,150,62,0.06);pointer-events:none;}
.card + .card{margin-top:14px;}

.hp-wrap{margin-bottom:10px;}
.hp-label{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--parch-dim);margin-bottom:3px;}
.bar{height:10px;border-radius:5px;background:#0d0b09;border:1px solid var(--line);overflow:hidden;}
.bar-fill{height:100%;transition:width 0.4s ease;}
.bar-fill.hp{background:linear-gradient(90deg,var(--blood),var(--blood-bright));}
.bar-fill.xp{background:linear-gradient(90deg,var(--forest-dim),var(--forest));}
.bar-fill.prayer{background:linear-gradient(90deg,#2f4d57,var(--sky));}
.bar-fill.mon{background:linear-gradient(90deg,#5a5045,#7a6d5c);}

.gold-line{display:flex;align-items:center;gap:6px;font-size:0.95rem;color:var(--gold-bright);margin-bottom:12px;}

.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;}
.skill{display:flex;flex-direction:column;gap:4px;font-size:0.82rem;padding:6px 8px;border-radius:3px;background:rgba(0,0,0,0.15);}
.skill-top{display:flex;justify-content:space-between;}
.skill-bar{height:5px;border-radius:3px;background:#0d0b09;border:1px solid rgba(255,255,255,0.04);overflow:hidden;}
.skill-bar-fill{height:100%;background:linear-gradient(90deg,var(--forest-dim),var(--forest));transition:width 0.4s ease;}
.skill-xp{font-size:0.62rem;color:var(--parch-dim);text-align:right;letter-spacing:0.02em;}
.skill .lvl{color:var(--gold);font-weight:600;}
.skill.leveling{animation:pulse 1.4s ease infinite;}
@keyframes pulse{0%,100%{background:rgba(0,0,0,0.15);}50%{background:rgba(200,150,62,0.18);}}

.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--parch-dim);padding:8px 14px;border-radius:5px 5px 0 0;cursor:pointer;font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.05em;text-transform:uppercase;}
.tab.active{color:var(--gold-bright);border-bottom-color:var(--panel2);background:var(--panel2);}
.tab:hover{color:var(--parch);}

.area-title{font-size:1.3rem;color:var(--gold-bright);margin:0 0 4px;}
.area-desc{color:var(--parch-dim);font-size:0.88rem;margin:0 0 16px;font-style:italic;}

.node-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.node{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:12px;}
.node h4{margin:0 0 4px;font-size:1rem;color:var(--parch);}
.node .meta{font-size:0.75rem;color:var(--parch-dim);margin-bottom:8px;}
.node.locked{opacity:0.45;}

.btn{font-family:'Cinzel',serif;font-size:0.74rem;letter-spacing:0.05em;text-transform:uppercase;background:var(--forest-dim);color:#e7ead8;border:1px solid var(--forest);border-radius:4px;padding:7px 12px;cursor:pointer;transition:filter 0.15s;}
.btn:hover{filter:brightness(1.2);}
.btn:disabled{opacity:0.35;cursor:not-allowed;filter:none;}
.btn.stop{background:var(--blood);border-color:var(--blood-bright);}
.btn.gold{background:#4a3a1a;border-color:var(--gold);color:var(--gold-bright);}
.btn.small{padding:4px 9px;font-size:0.68rem;}

.monster-card{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:12px;margin-bottom:10px;}
.monster-top{display:flex;justify-content:space-between;align-items:baseline;}
.monster-top h4{margin:0;color:var(--parch);}
.monster-top .lv{color:var(--blood-bright);font-size:0.78rem;}
.monster-stats{display:flex;gap:14px;font-size:0.72rem;color:var(--parch-dim);margin:6px 0 8px;}

.fight-box{border:1px solid var(--gold);background:rgba(200,150,62,0.06);border-radius:6px;padding:14px;margin-bottom:14px;}
.fight-vs{display:flex;justify-content:space-between;gap:20px;margin-bottom:10px;}
.fight-side{flex:1;}
.fight-side h4{margin:0 0 6px;font-size:0.9rem;}

.log{background:#0d0b09;border:1px solid var(--line);border-radius:5px;padding:10px 12px;height:150px;overflow-y:auto;font-size:0.82rem;color:var(--parch-dim);display:flex;flex-direction:column-reverse;}
.log div{padding:2px 0;border-bottom:1px dashed rgba(255,255,255,0.04);}
.log .hit{color:var(--blood-bright);}
.log .lvup{color:var(--gold-bright);font-weight:600;}
.log .drop{color:var(--forest);}

.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;}
.inv-item{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:8px 10px;font-size:0.8rem;display:flex;justify-content:space-between;align-items:center;}
.inv-item .qty{color:var(--gold);}
.inv-actions{display:flex;gap:4px;margin-top:6px;}

.recipe{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:10px 12px;margin-bottom:8px;}
.recipe .req{font-size:0.72rem;color:var(--parch-dim);}
.recipe.locked{opacity:0.4;}

.shop-item{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:10px 12px;margin-bottom:8px;}
.equip-row{display:flex;justify-content:space-between;font-size:0.82rem;padding:4px 0;color:var(--parch-dim);}
.equip-row b{color:var(--parch);}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);color:var(--gold-bright);padding:10px 20px;border-radius:6px;font-family:'Cinzel',serif;font-size:0.85rem;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,0.5);animation:toastIn 0.3s ease, toastOut 0.4s ease 2.4s forwards;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-10px);}}

.travel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:16px;}
.travel-card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px;cursor:pointer;transition:border-color 0.15s;}
.travel-card:hover{border-color:var(--gold);}
.travel-card.here{border-color:var(--forest);}
.travel-card h4{margin:0 0 4px;color:var(--parch);}
.travel-card p{margin:0;font-size:0.75rem;color:var(--parch-dim);}

.empty{color:var(--parch-dim);font-style:italic;font-size:0.85rem;padding:20px 0;text-align:center;}

.login-screen{max-width:520px;margin:60px auto;text-align:center;}
.login-screen h1{font-size:2.4rem;color:var(--gold-bright);margin:0 0 4px;text-shadow:0 0 22px rgba(200,150,62,0.3);}
.login-screen .sub{color:var(--parch-dim);font-size:0.8rem;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:32px;}
.profile-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.profile-card{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:10px 14px;}
.profile-card:hover{border-color:var(--gold);}
.profile-card .pname{font-family:'Cinzel',serif;color:var(--parch);font-size:0.95rem;}
.profile-card .pmeta{font-size:0.7rem;color:var(--parch-dim);}
.profile-actions{display:flex;gap:6px;}
.new-char-row{display:flex;gap:8px;margin-top:10px;}
.new-char-row input{flex:1;background:#0d0b09;border:1px solid var(--line);color:var(--parch);padding:9px 12px;border-radius:4px;font-family:'Spectral',serif;font-size:0.9rem;}
.new-char-row input:focus{outline:none;border-color:var(--gold);}
.switch-link{background:none;border:none;color:var(--parch-dim);font-size:0.72rem;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;font-family:'Cinzel',serif;padding:6px 0;text-decoration:underline;}
.switch-link:hover{color:var(--gold-bright);}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal-box{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--gold);border-radius:8px;padding:20px;max-width:520px;width:100%;max-height:80vh;overflow-y:auto;}
.modal-box h3{margin:0 0 4px;color:var(--gold-bright);font-size:1.2rem;}
.modal-box .sub{color:var(--parch-dim);font-size:0.78rem;margin-bottom:16px;}
.guide-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px dashed rgba(255,255,255,0.06);font-size:0.85rem;}
.guide-row .glvl{color:var(--gold);font-family:'Cinzel',serif;font-weight:700;min-width:38px;}
.guide-row .gname{flex:1;padding:0 10px;color:var(--parch);}
.guide-row .gtype{color:var(--parch-dim);font-size:0.72rem;}
.guide-row.unlocked .gname{color:var(--forest);}
.modal-close{margin-top:16px;width:100%;}

.collapse-header{cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.collapse-header:hover .area-title{color:var(--gold-bright);}
.collapse-chevron{color:var(--gold);font-size:0.85rem;transition:transform 0.15s;}
</style>
</head>

// ---------- ITEM UPGRADE SYSTEM (+1 to +5) ----------
// Weapons/armor/shields can be upgraded using bars + gold. Upgraded items use an id
// like "sword_bronze+3" and are generated lazily the first time they're looked up,
// then cached onto ITEMS_BASE so every later ITEMS[id] read (equip checks, combat
// math, selling, display) just works without any other code needing to change.
function getBaseIdAndPlus(id){
  const idx = id.indexOf('+');
  if(idx===-1) return {baseId:id, plus:0};
  return {baseId:id.slice(0,idx), plus:parseInt(id.slice(idx+1),10)||0};
}
function isUpgradable(id){
  const {baseId} = getBaseIdAndPlus(id);
  const base = ITEMS_BASE[baseId];
  return !!(base && base.slot && ['weapon','armor','shield'].includes(base.slot) && !base.ranged);
}
function tierBarFor(baseId){
  if(baseId.includes('bronze')) return 'bar_bronze';
  if(baseId.includes('iron')) return 'bar_iron';
  if(baseId.includes('steel')) return 'bar_steel';
  if(baseId.includes('mithril')) return 'bar_mithril';
  if(baseId.includes('leather')) return 'leather';
  return null;
}
function tierGoldFor(baseId){
  if(baseId.includes('mithril')) return 90;
  if(baseId.includes('steel')) return 50;
  if(baseId.includes('iron')) return 25;
  if(baseId.includes('bronze')) return 10;
  if(baseId.includes('leather')) return 15;
  return 20;
}
function upgradeCost(baseId, nextPlus){
  const barId = tierBarFor(baseId);
  return { barId, barQty: barId? nextPlus : 0, gold: tierGoldFor(baseId)*nextPlus };
}
function buildUpgradedItem(baseId, plus){
  const base = ITEMS_BASE[baseId];
  if(!base) return null;
  const mult = 1 + plus*0.05; // +5% per plus level, capped at +25% for +5
  const derived = Object.assign({}, base);
  derived.name = `${base.name} +${plus}`;
  if(base.atk) derived.atk = Math.round(base.atk*mult);
  if(base.str) derived.str = Math.round(base.str*mult);
  if(base.def) derived.def = Math.round(base.def*mult);
  derived.sell = Math.round((base.sell||0) * (1 + plus*0.35));
  derived.baseId = baseId;
  derived.plus = plus;
  return derived;
}
const ITEMS = new Proxy(ITEMS_BASE, {
  get(target, prop){
    if(prop in target) return target[prop];
    if(typeof prop === 'string' && prop.includes('+')){
      const {baseId, plus} = getBaseIdAndPlus(prop);
      if(target[baseId] && plus>=1 && plus<=5){
        const derived = buildUpgradedItem(baseId, plus);
        target[prop] = derived;
        return derived;
      }
    }
    return undefined;
  }
});

// ---------- XP / LEVEL MATH (authentic-style curve) ----------
function xpForLevel(level){
  let total=0;
  for(let n=1;n<level;n++){
    total += Math.floor(n + 300*Math.pow(2, n/7));
  }
  return Math.floor(total/4);
}
const LEVEL_XP_TABLE = (()=>{const t=[0]; for(let l=1;l<=99;l++) t.push(xpForLevel(l+1)); return t;})();
function levelFromXp(xp){
  let lvl=1;
  for(let l=99;l>=1;l--){ if(xp>=LEVEL_XP_TABLE[l-1]){ lvl=l; break; } }
  return Math.min(lvl,99);
}

function freshState(){

  return {

}

function getLevel(skill, skillsObj){
  const xp = (skillsObj||state.skills)[skill].xp;
  return levelFromXp(xp);
}
function skillProgress(skill){
  const xp = state.skills[skill].xp;
  const level = getLevel(skill);
  if(level>=99){
    return {level, pct:100, cur:xp, need:xp, maxed:true};
  }
  const curThresh = LEVEL_XP_TABLE[level-1];
  const nextThresh = LEVEL_XP_TABLE[level];
  const span = nextThresh-curThresh;
  const into = xp-curThresh;
  return {level, pct: Math.min(100,Math.max(0,(into/span)*100)), cur: into, need: span, maxed:false};
}
function maxHp(){ return getLevel('hitpoints'); }
function maxPrayer(){ return getLevel('prayer'); }
const REST_COOLDOWN_MS = 30*60*1000;
function restCooldownRemaining(){
  const elapsed = Date.now() - (state.lastRestTime||0);
  return Math.max(0, REST_COOLDOWN_MS - elapsed);
}
function restToHeal(){
  const remaining = restCooldownRemaining();
  if(remaining > 0){
    const mins = Math.ceil(remaining/60000);
    pushLog(`<span class="hit">You're still weary from your last rest. Try again in ${mins} more minute${mins===1?'':'s'}.</span>`);
    render();
    return;
  }
  state.currentHp = maxHp();
  state.lastRestTime = Date.now();
  pushLog('You rest in town and recover to full health.');
  queueSave(); render();
}
const ALTAR_COOLDOWN_MS = 10*60*1000;
function altarCooldownRemaining(){
  const elapsed = Date.now() - (state.lastAltarTime||0);
  return Math.max(0, ALTAR_COOLDOWN_MS - elapsed);
}
function prayAtAltar(){
  const remaining = altarCooldownRemaining();
  if(remaining > 0){
    const mins = Math.ceil(remaining/60000);
    pushLog(`<span class="hit">The altar's power hasn't replenished yet. Try again in ${mins} more minute${mins===1?'':'s'}.</span>`);
    render();
    return;
  }
  state.currentPrayer = maxPrayer();
  state.lastAltarTime = Date.now();
  pushLog('You kneel at the altar and your prayer points are fully restored.');
  queueSave(); render();
}
function getCombatLevel(){
  const att = getLevel('attack'), str = getLevel('strength'), def = getLevel('defence'),
        hp = getLevel('hitpoints'), pray = getLevel('prayer'), rng = getLevel('ranged'), mag = getLevel('magic');
  const base = 0.25 * (def + hp + Math.floor(pray/2));
  const meleeStyle = 0.325 * (att + str);
  const rangedStyle = 0.325 * Math.floor(rng*1.5);
  const magicStyle = 0.325 * Math.floor(mag*1.5);
  return Math.floor(base + Math.max(meleeStyle, rangedStyle, magicStyle));
}

function togglePrayer(id){
  const p = PRAYERS.find(pr=>pr.id===id);
  if(!p) return;
  const lvl = getLevel('prayer');
  if(lvl < p.level) return;
  if(state.activePrayers.includes(id)){
    state.activePrayers = state.activePrayers.filter(x=>x!==id);
  } else {
    if(state.currentPrayer <= 0) return;
    // only one prayer per group active at a time
    state.activePrayers = state.activePrayers.filter(x=>{
      const other = PRAYERS.find(pr=>pr.id===x);
      return !other || other.group !== p.group;
    });
    state.activePrayers.push(id);
  }
  queueSave(); render();
}
function activePrayerObjs(){
  return state.activePrayers.map(id=>PRAYERS.find(p=>p.id===id)).filter(Boolean);
}
function prayerBonuses(){
  const objs = activePrayerObjs();
  let atk=0, str=0, def=0, reduceDmg=0, drain=0;
  objs.forEach(p=>{
    atk += p.atk||0; str += p.str||0; def += p.def||0;
    reduceDmg = Math.max(reduceDmg, p.reduceDmg||0);
    drain += p.drain;
  });
  return {atk,str,def,reduceDmg,drain};
}
function drainPrayer(amount){
  if(amount<=0) return;
  state.currentPrayer = Math.max(0, state.currentPrayer - amount);
  if(state.currentPrayer<=0 && state.activePrayers.length>0){
    state.activePrayers = [];
    pushLog(`<span class="hit">Your prayer points run dry and your prayers fade.</span>`);
  }
}

function addItem(id, qty=1){
  state.inventory[id] = (state.inventory[id]||0) + qty;
}
function removeItem(id, qty=1){
  if(!state.inventory[id]) return false;
  state.inventory[id]-=qty;
  if(state.inventory[id]<=0) delete state.inventory[id];
  return true;
}
function hasItems(need){
  return Object.entries(need).every(([id,q])=> (state.inventory[id]||0)>=q);
}

function addXp(skill, amount){
  const before = getLevel(skill);
  state.skills[skill].xp += amount;
  const after = getLevel(skill);
  if(after>before){
    pushLog(`<span class="lvup">&#9733; ${SKILL_LABEL[skill]} level up! Now level ${after}.</span>`);
    showToast(`${SKILL_LABEL[skill]} is now level ${after}!`);
    if(skill==='hitpoints') state.currentHp = Math.min(state.currentHp + (after-before), maxHp());
    if(skill==='prayer') state.currentPrayer = Math.min(state.currentPrayer + (after-before), maxPrayer());
  }
  // training any other skill also builds a little Constitution (more max HP over time)
  if(skill!=='hitpoints' && amount>0){
    addXp('hitpoints', Math.max(1, Math.round(amount*0.15)));
  }
}

function pushLog(html){
  state.log.unshift(html);
  if(state.log.length>60) state.log.length=60;
}

function showToast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2900);
}

// ---------- STORAGE (works inside Claude's artifact viewer, and falls back
// to localStorage automatically when the file is downloaded and opened in a
// regular browser, since window.storage only exists inside Claude) ----------
const hasClaudeStorage = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
async function storageGet(key, shared){
  if(hasClaudeStorage) return await window.storage.get(key, shared);
  const raw = localStorage.getItem((shared?'shared:':'priv:')+key);
  if(raw===null) throw new Error('not found');
  return {key, value: raw, shared};
}
async function storageSet(key, value, shared){
  if(hasClaudeStorage) return await window.storage.set(key, value, shared);
  localStorage.setItem((shared?'shared:':'priv:')+key, value);
  return {key, value, shared};
}
async function storageDelete(key, shared){
  if(hasClaudeStorage) return await window.storage.delete(key, shared);
  localStorage.removeItem((shared?'shared:':'priv:')+key);
  return {key, deleted:true, shared};
}

// ---------- LOGIN / PROFILES ----------
let appState = 'login'; // 'login' | 'game'
let profiles = [];       // [{slug,name,createdAt}]
let currentSlug = null;
let deleteArmed = null;  // slug currently showing "confirm delete"

function slugify(name){
  return (name||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40);
}
async function loadProfiles(){
  try{
    const res = await storageGet('profiles', false);
    if(res && res.value) profiles = JSON.parse(res.value);
    else profiles = [];
  }catch(e){ profiles = []; }
}
async function saveProfiles(){
  try{ await storageSet('profiles', JSON.stringify(profiles), false); }
  catch(e){ console.error('profile list save failed', e); }
}

async function createCharacter(rawName){
  const name = (rawName||'').trim();
  if(!name) return;
  let slug = slugify(name);
  if(!slug) slug = 'hero';
  // ensure uniqueness
  let base = slug, n = 2;
  while(profiles.some(p=>p.slug===slug)){ slug = `${base}-${n++}`; }
  profiles.push({slug, name, createdAt: Date.now()});
  await saveProfiles();
  await enterCharacter(slug, name);
}

async function enterCharacter(slug, name){
  currentSlug = slug;
  lastSavedSnapshot = null;
  saveRetryCount = 0;
  await loadGame(slug, name);
  appState = 'game';
  pushLog(`Welcome, ${state.name}. Your journey continues in the town square.`);
  render();
}

function switchCharacter(){
  clearInterval(activityInterval); activityInterval=null;
  fight=null; activeGather=null; activeCraft=null;
  appState='login';
  deleteArmed=null;
  render();
}

function armDelete(slug){ deleteArmed = slug; render(); }
async function confirmDelete(slug){
  try{ await storageDelete(`character:${slug}`, false); }catch(e){ /* may not exist */ }
  profiles = profiles.filter(p=>p.slug!==slug);
  await saveProfiles();
  deleteArmed=null;
  render();
}

// ---------- PERSISTENCE (per-character) ----------
async function loadGame(slug, name){
  try{
    const res = await storageGet(`character:${slug}`, false);
    if(res && res.value){
      state = JSON.parse(res.value);
      // backfill any new skills/fields from older saves
      SKILLS.forEach(s=>{ if(!state.skills[s]) state.skills[s]={xp:0}; });
      if(state.currentHp===undefined) state.currentHp = maxHp();
      if(state.currentPrayer===undefined) state.currentPrayer = maxPrayer();
      if(!state.activePrayers) state.activePrayers = [];
      if(!state.combatStyle) state.combatStyle = 'shared';
      if(state.lastRestTime===undefined) state.lastRestTime = 0;
      if(state.lastAltarTime===undefined) state.lastAltarTime = 0;
      if(!state.quests) state.quests = {blacksmithPickaxe:'not_started', lumberjackAxe:'not_started'};
      if(!state.quests.blacksmithPickaxe) state.quests.blacksmithPickaxe = 'not_started';
      if(!state.quests.lumberjackAxe) state.quests.lumberjackAxe = 'not_started';
      if(!state.equipment) state.equipment={weapon:null,armor:null,amulet:null,quiver:null,shield:null};
      if(state.equipment.amulet===undefined) state.equipment.amulet=null;
      if(state.equipment.quiver===undefined) state.equipment.quiver=null;
      if(state.equipment.shield===undefined) state.equipment.shield=null;
      if(state.equipment.toolbeltAxe===undefined) state.equipment.toolbeltAxe=null;
      if(state.equipment.toolbeltPickaxe===undefined) state.equipment.toolbeltPickaxe=null;
      return;
    }
  }catch(e){ /* no save yet */ }
  state = freshState();
  state.name = name || 'Adventurer';
}
let lastSavedSnapshot = null;
let saveRetryCount = 0;
function queueSave(){
  if(!currentSlug) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 2500);
}
async function doSave(){
  if(!currentSlug) return;
  const snapshot = JSON.stringify(state);
  if(snapshot === lastSavedSnapshot) return; // nothing changed, skip the call
  try{
    await storageSet(`character:${currentSlug}`, snapshot, false);
    lastSavedSnapshot = snapshot;
    saveRetryCount = 0;
  }catch(e){
    console.error('save failed', e);
    // back off and try again shortly, up to a few attempts, so a transient
    // rate-limit or hiccup doesn't silently drop progress forever
    if(saveRetryCount < 4){
      saveRetryCount++;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(doSave, 4000 * saveRetryCount);
    }
  }
}

// ---------- ACTIVITY LOOPS ----------
let activityInterval = null;
let activeGather = null; // {skill, resource}
function stopGather(){
  clearInterval(activityInterval); activityInterval=null; activeGather=null; render();
}
function requiredToolSlot(skill){
  if(skill==='woodcutting') return 'toolbeltAxe';
  if(skill==='mining') return 'toolbeltPickaxe';
  return null;
}
function startGather(skill, resource){
  stopGather();
  const lvl = getLevel(skill);
  if(lvl < resource.level) return;
  const toolSlot = requiredToolSlot(skill);
  if(toolSlot && !state.equipment[toolSlot]){
    const toolName = toolSlot==='toolbeltAxe' ? 'an axe' : 'a pickaxe';
    pushLog(`<span class="hit">You need ${toolName} in your tool belt to do that.</span>`);
    render();
    return;
  }
  const toolBonus = toolSlot && state.equipment[toolSlot] ? (ITEMS[state.equipment[toolSlot]].gatherBonus||0) : 0;
  activeGather = {skill, resource};
  render();
  activityInterval = setInterval(()=>{
    const chance = 0.55 + Math.min(0.4, (lvl-resource.level)*0.01) + toolBonus;
    if(Math.random() < chance){
      addItem(resource.id,1);
      addXp(skill, resource.xp);
      pushLog(`You obtain <span class="drop">${ITEMS[resource.id].name}</span> (${state.inventory[resource.id]}). (+${resource.xp} ${SKILL_LABEL[skill]} xp)`);
    } else {
      pushLog(`You fail to gather anything.`);
    }
    queueSave(); render();
  }, resource.time*1000);
}

let fight = null; // {monsterDef, monsterHp, areaId}
function startFight(areaId, monsterDef){
  if(fight) return;
  stopGather();
  fight = {areaId, def: monsterDef, hp: monsterDef.hp, maxHp: monsterDef.hp};
  render();
  activityInterval = setInterval(combatRound, 1400);
}
function fleeFight(){
  clearInterval(activityInterval); activityInterval=null;
  pushLog(`You flee from the ${fight.def.name}.`);
  fight=null; render();
}
function isRangedEquipped(){
  const wId = state.equipment.weapon;
  return !!(wId && ITEMS[wId] && ITEMS[wId].ranged);
}
function meleeBonus(){
  let atk=0, str=0, def=0;
  const wId = state.equipment.weapon;
  if(wId && ITEMS[wId] && !ITEMS[wId].ranged){
    atk += ITEMS[wId].atk||0; str += ITEMS[wId].str||0;
  }
  ['armor','amulet','shield'].forEach(slot=>{
    const id = state.equipment[slot];
    if(id && ITEMS[id]){
      atk += ITEMS[id].atk||0;
      str += ITEMS[id].str||0;
      def += ITEMS[id].def||0;
    }
  });
  return {atk,str,def};
}
function rangedBonus(){
  let atk=0, str=0, def=0;
  const wId = state.equipment.weapon;
  if(wId && ITEMS[wId] && ITEMS[wId].ranged){ atk += ITEMS[wId].atk||0; }
  const qId = state.equipment.quiver;
  if(qId && ITEMS[qId] && (state.inventory[qId]||0)>0){ str += ITEMS[qId].str||0; }
  ['armor','amulet','shield'].forEach(slot=>{
    const id = state.equipment[slot];
    if(id && ITEMS[id]){
      atk += ITEMS[id].atk||0;
      str += ITEMS[id].str||0;
      def += ITEMS[id].def||0;
    }
  });
  return {atk,str,def};
}
// kept for backwards compatibility with anything still calling the old name
function playerCombatBonus(){ return meleeBonus(); }
const MELEE_STYLES = ['attack','strength','defence','shared'];
const RANGED_STYLES = ['accurate','rapid','longshot'];
const STYLE_INFO = {
  attack:{label:'Attack',desc:'Trains Attack only'},
  strength:{label:'Strength',desc:'Trains Strength only'},
  defence:{label:'Defence',desc:'Trains Defence only'},
  shared:{label:'Shared',desc:'Trains Attack, Strength & Defence evenly'},
  accurate:{label:'Accurate',desc:'More damage, fewer misses. Ranged xp'},
  rapid:{label:'Rapid',desc:'More misses than Accurate, no damage bonus. Ranged xp'},
  longshot:{label:'Longshot',desc:'Average damage, higher damage avoidance. Ranged & Defence xp'},
};
function currentStyleOptions(){ return isRangedEquipped() ? RANGED_STYLES : MELEE_STYLES; }
function effectiveCombatStyle(){
  const opts = currentStyleOptions();
  return opts.includes(state.combatStyle) ? state.combatStyle : opts[0];
}
function setCombatStyle(style){ state.combatStyle = style; queueSave(); render(); }

function combatRound(){
  const pray = prayerBonuses();
  const style = effectiveCombatStyle();
  const ranged = isRangedEquipped();
  const m = fight.def;
  let dmg = 0;

  if(!ranged){
    // ---- MELEE ----
    const bonus = meleeBonus();
    const atkLvl = getLevel('attack'), strLvl = getLevel('strength'), defLvl = getLevel('defence');
    const effAtk = (atkLvl+bonus.atk) * (1+pray.atk);
    const effStr = strLvl * (1+pray.str);
    const effDef = (defLvl+bonus.def) * (1+pray.def);

    const pAcc = clamp(0.5 + (effAtk - m.defence)*0.018, 0.15, 0.95);
    if(Math.random() < pAcc){
      const pMax = Math.max(1, Math.floor(effStr*0.45) + Math.floor(bonus.str*0.6) + 1);
      dmg = 1+Math.floor(Math.random()*pMax);
      fight.hp -= dmg;
      pushLog(`<span class="hit">You hit the ${m.name} for ${dmg}.</span>`);
      if(style==='attack') addXp('attack', Math.round(dmg*4));
      else if(style==='strength') addXp('strength', Math.round(dmg*4));
      else if(style==='defence') addXp('defence', Math.round(dmg*4));
      else { addXp('attack', Math.round(dmg*1.33)); addXp('strength', Math.round(dmg*1.33)); addXp('defence', Math.round(dmg*1.33)); }
    } else {
      pushLog(`You swing at the ${m.name} and miss.`);
    }

    if(fight.hp <= 0){ winFight(); return; }

    const mAcc = clamp(0.5 + (m.attack - effDef)*0.018, 0.1, 0.9);
    if(Math.random() < mAcc){
      let dmg2 = 1+Math.floor(Math.random()*m.maxHit);
      if(pray.reduceDmg>0) dmg2 = Math.max(0, Math.round(dmg2*(1-pray.reduceDmg)));
      state.currentHp -= dmg2;
      pushLog(`<span class="hit">${m.name} hits you for ${dmg2}.</span>`);
    } else {
      pushLog(`${m.name} attacks and misses.`);
    }
  } else {
    // ---- RANGED ----
    const bonus = rangedBonus();
    const rngLvl = getLevel('ranged'), defLvl = getLevel('defence');
    const styleAccMult = style==='accurate'? 1.10 : style==='rapid'? 0.90 : 1.0;
    const styleDmgMult = style==='accurate'? 1.15 : 1.0;
    const styleDefMult = style==='longshot'? 1.25 : 1.0;
    const effAtk = (rngLvl+bonus.atk) * (1+pray.atk) * styleAccMult;
    const effStr = rngLvl * (1+pray.str);
    const effDef = (defLvl+bonus.def) * (1+pray.def) * styleDefMult;

    if(!state.equipment.quiver || (state.inventory[state.equipment.quiver]||0)<=0){
      pushLog(`<span class="hit">You have no arrows nocked! Equip arrows from your Inventory.</span>`);
      stopFightNoAmmo(); return;
    }

    const pAcc = clamp(0.5 + (effAtk - m.defence)*0.018, 0.15, 0.95);
    if(Math.random() < pAcc){
      const pMax = Math.max(1, Math.floor((effStr*0.45 + bonus.str*0.6)*styleDmgMult) + 1);
      dmg = 1+Math.floor(Math.random()*pMax);
      fight.hp -= dmg;
      removeItem(state.equipment.quiver, 1);
      pushLog(`<span class="hit">You shoot the ${m.name} for ${dmg}.</span>`);
      if(style==='longshot'){ addXp('ranged', Math.round(dmg*2)); addXp('defence', Math.round(dmg*2)); }
      else addXp('ranged', Math.round(dmg*4));
    } else {
      removeItem(state.equipment.quiver, 1);
      pushLog(`You loose an arrow at the ${m.name} and miss.`);
    }

    if(fight.hp <= 0){ winFight(); return; }

    const mAcc = clamp(0.5 + (m.attack - effDef)*0.018, 0.1, 0.9);
    if(Math.random() < mAcc){
      let dmg2 = 1+Math.floor(Math.random()*m.maxHit);
      if(pray.reduceDmg>0) dmg2 = Math.max(0, Math.round(dmg2*(1-pray.reduceDmg)));
      state.currentHp -= dmg2;
      pushLog(`<span class="hit">${m.name} hits you for ${dmg2}.</span>`);
    } else {
      pushLog(`${m.name} attacks and misses.`);
    }
  }

  if(pray.drain>0) drainPrayer(pray.drain);

  if(state.currentHp <= 0){
    loseFight(); return;
  }
  queueSave(); render();
}
function stopFightNoAmmo(){
  clearInterval(activityInterval); activityInterval=null;
  fight=null;
  queueSave(); render();
}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

function winFight(){
  const m = fight.def;
  clearInterval(activityInterval); activityInterval=null;
  const gold = m.gold[0]+Math.floor(Math.random()*(m.gold[1]-m.gold[0]+1));
  state.gold += gold;
  pushLog(`<span class="lvup">You have defeated the ${m.name}!</span> (+${gold} gold, ${state.gold} total)`);
  m.drops.forEach(d=>{
    if(Math.random() < d.chance){
      const qty = d.qty ? (d.qty[0]+Math.floor(Math.random()*(d.qty[1]-d.qty[0]+1))) : 1;
      addItem(d.id, qty);
      pushLog(`<span class="drop">The ${m.name} drops ${qty>1? qty+'x ':''}${ITEMS[d.id].name}</span> (${state.inventory[d.id]}).`);
    }
  });
  fight.hp = 0;
  fight.finished = true;
  queueSave(); render();
}
function fightAgain(){
  if(!fight || !fight.finished) return;
  const areaId = fight.areaId;
  const def = fight.def;
  fight = null;
  startFight(areaId, Object.assign({}, def));
}
function leaveCombat(){
  fight = null;
  render();
}
function loseFight(){
  clearInterval(activityInterval); activityInterval=null;
  const lostGold = Math.floor(state.gold*0.1);
  state.gold -= lostGold;
  state.currentHp = maxHp();
  pushLog(`<span class="hit">You have been defeated and stagger back to town...</span> (-${lostGold} gold, ${state.gold} total)`);
  fight=null;
  state.location='town';
  queueSave(); render();
}

// ---------- CRAFTING ----------
let activeCraft = null; // {category, recipeId, qtyTotal, qtyDone, elapsed, timePerItem}
function maxCraftable(recipe){
  let max = Infinity;
  Object.entries(recipe.need).forEach(([id,q])=>{
    const have = state.inventory[id]||0;
    max = Math.min(max, Math.floor(have/q));
  });
  if(recipe.goldCost){
    max = Math.min(max, Math.floor(state.gold/recipe.goldCost));
  }
  if(max===Infinity) max=0;
  return max;
}
function startCraft(category, recipeId, qty){
  if(activeCraft || fight || activeGather) return;
  const recipe = RECIPES[category].find(r=>r.id===recipeId);
  if(!recipe) return;
  const lvl = getLevel(category);
  if(lvl < recipe.level) return;
  const maxable = maxCraftable(recipe);
  let qtyTotal = (qty==='all') ? maxable : Math.min(Math.floor(qty)||1, maxable);
  if(qtyTotal <= 0) return;
  activeCraft = {category, recipeId, qtyTotal, qtyDone:0, elapsed:0, timePerItem: recipe.time||2.5};
  render();
  activityInterval = setInterval(craftTick, 100);
}
function craftTick(){
  const ac = activeCraft;
  if(!ac) return;
  const recipe = RECIPES[ac.category].find(r=>r.id===ac.recipeId);
  ac.elapsed += 100;

  if(ac.elapsed >= ac.timePerItem*1000){
    ac.elapsed = 0;
    if(!hasItems(recipe.need)){
      pushLog('You run out of materials to continue crafting.');
      stopCraft(); return;
    }
    if(recipe.goldCost && state.gold < recipe.goldCost){
      pushLog('You run out of gold to continue crafting.');
      stopCraft(); return;
    }
    Object.entries(recipe.need).forEach(([id,q])=>removeItem(id,q));
    if(recipe.goldCost) state.gold -= recipe.goldCost;
    const outQty = recipe.outputQty||1;
    addItem(recipe.id, outQty);
    addXp(ac.category, recipe.xp);
    pushLog(`You craft <span class="drop">${outQty>1?outQty+'x ':''}${ITEMS[recipe.id].name}</span> (${state.inventory[recipe.id]}). (+${recipe.xp} ${SKILL_LABEL[ac.category]} xp)`);
    ac.qtyDone++;
    queueSave();
    if(ac.qtyDone >= ac.qtyTotal){
      pushLog(`Finished crafting ${ac.qtyDone}x ${ITEMS[recipe.id].name}.`);
      stopCraft(); return;
    }
    // a full re-render only happens once per completed item (not every 100ms),
    // so buttons like Cancel stay stable and clickable in between
    render();
    return;
  }

  // fast path: just nudge the progress bar's width/text directly,
  // without tearing down and rebuilding the whole page every 100ms
  const fillEl = document.getElementById('craft-progress-fill');
  const textEl = document.getElementById('craft-progress-text');
  if(fillEl){
    fillEl.style.width = Math.min(100,(ac.elapsed/(ac.timePerItem*1000))*100)+'%';
  }
  if(textEl){
    textEl.textContent = `${ac.qtyDone} / ${ac.qtyTotal} made`;
  }
}
function stopCraft(){
  clearInterval(activityInterval); activityInterval=null; activeCraft=null; render();
}

function sellQty(id, amount){
  const have = state.inventory[id]||0;
  if(have<=0) return;
  const qty = (amount==='all') ? have : Math.min(Math.max(1,Math.floor(amount)||1), have);
  if(qty<=0) return;
  const val = (ITEMS[id].sell||1)*qty;
  removeItem(id, qty);
  state.gold += val;
  const remaining = state.inventory[id]||0;
  pushLog(`You sell ${qty>1?qty+'x ':''}${ITEMS[id].name} for ${val} gold (${remaining} left, ${state.gold} gold total).`);
  queueSave(); render();
}
function useConsumable(id){
  const item = ITEMS[id];
  if(!item || !state.inventory[id]) return;
  if(!item.heal && !item.prayerRestore) return;
  removeItem(id,1);
  const parts = [];
  if(item.heal){
    state.currentHp = Math.min(maxHp(), state.currentHp+item.heal);
    parts.push(`recover ${item.heal} HP`);
  }
  if(item.prayerRestore){
    state.currentPrayer = Math.min(maxPrayer(), state.currentPrayer+item.prayerRestore);
    parts.push(`restore ${item.prayerRestore} Prayer`);
  }
  const verb = item.drink ? 'drink' : 'eat';
  pushLog(`You ${verb} ${item.name} and ${parts.join(' and ')}.`);
  queueSave(); render();
}
function meetsRequirement(id){
  const it = ITEMS[id];
  if(!it || !it.reqSkill) return true;
  return getLevel(it.reqSkill) >= it.reqLevel;
}
function equipFromInventory(id){
  const it = ITEMS[id];
  const slot = it && it.slot;
  if(!slot || !state.inventory[id]) return;
  if(!meetsRequirement(id)){
    pushLog(`<span class="hit">You need ${SKILL_LABEL[it.reqSkill]} level ${it.reqLevel} to use ${it.name}.</span>`);
    render();
    return;
  }
  if(slot==='quiver'){
    state.equipment.quiver = id;
    pushLog(`You nock ${ITEMS[id].name} in your quiver.`);
    queueSave(); render();
    return;
  }
  const prevId = state.equipment[slot];
  removeItem(id,1);
  if(prevId) addItem(prevId,1);
  state.equipment[slot] = id;
  pushLog(`You equip ${ITEMS[id].name}.`);
  queueSave(); render();
}
function buryItem(id){
  if(!state.inventory[id] || !ITEMS[id].buryXp) return;
  removeItem(id,1);
  addXp('prayer', ITEMS[id].buryXp);
  pushLog(`You bury the ${ITEMS[id].name}. (+${ITEMS[id].buryXp} Prayer xp)`);
  queueSave(); render();
}
function buyItem(shopItem){
  if(state.gold < shopItem.price) return;
  state.gold -= shopItem.price;
  if(shopItem.type==='weapon' || shopItem.type==='armor' || shopItem.type==='amulet'){
    const prevId = state.equipment[shopItem.type];
    if(prevId) addItem(prevId,1);
    state.equipment[shopItem.type] = shopItem.id;
    pushLog(`You purchase and equip ${shopItem.name}.`);
  } else {
    addItem(shopItem.id,1);
    pushLog(`You purchase ${shopItem.name} (${state.inventory[shopItem.id]}).`);
  }
  queueSave(); render();
}
function equipToolAsWeapon(id){
  const it = ITEMS[id];
  if(!it || !it.tool || !state.inventory[id]) return;
  if(it.weaponReqSkill && getLevel(it.weaponReqSkill) < it.weaponReqLevel){
    pushLog(`<span class="hit">You need ${SKILL_LABEL[it.weaponReqSkill]} level ${it.weaponReqLevel} to wield ${it.name} as a weapon.</span>`);
    render();
    return;
  }
  const prevId = state.equipment.weapon;
  removeItem(id,1);
  if(prevId) addItem(prevId,1);
  state.equipment.weapon = id;
  pushLog(`You equip ${it.name} as a weapon.`);
  queueSave(); render();
}
function equipToolToBelt(id){
  const it = ITEMS[id];
  if(!it || !it.tool || !state.inventory[id]) return;
  if(it.toolReqSkill && getLevel(it.toolReqSkill) < it.toolReqLevel){
    pushLog(`<span class="hit">You need ${SKILL_LABEL[it.toolReqSkill]} level ${it.toolReqLevel} to use ${it.name}.</span>`);
    render();
    return;
  }
  const slot = it.tool==='axe' ? 'toolbeltAxe' : 'toolbeltPickaxe';
  const prevId = state.equipment[slot];
  removeItem(id,1);
  if(prevId) addItem(prevId,1);
  state.equipment[slot] = id;
  pushLog(`You add ${it.name} to your tool belt.`);
  queueSave(); render();
}
function upgradeItem(id){
  if(!state.inventory[id]) return;
  const {baseId, plus} = getBaseIdAndPlus(id);
  if(plus>=5) return;
  const cost = upgradeCost(baseId, plus+1);
  if(cost.barId && (state.inventory[cost.barId]||0) < cost.barQty){
    pushLog(`<span class="hit">You need ${cost.barQty}x ${ITEMS[cost.barId].name} to upgrade this.</span>`);
    render(); return;
  }
  if(state.gold < cost.gold){
    pushLog(`<span class="hit">You need ${cost.gold} gold to upgrade this.</span>`);
    render(); return;
  }
  removeItem(id,1);
  if(cost.barId) removeItem(cost.barId, cost.barQty);
  state.gold -= cost.gold;
  const newId = `${baseId}+${plus+1}`;
  addItem(newId,1);
  pushLog(`Your ${ITEMS[baseId].name} has been upgraded to <span class="drop">${ITEMS[newId].name}</span>!`);
  queueSave(); render();
}
function unequip(slot){
  if(slot==='quiver'){
    state.equipment.quiver = null;
    queueSave(); render();
    return;
  }
  const id = state.equipment[slot];
  if(id) addItem(id,1);
  state.equipment[slot]=null;
  queueSave(); render();
}

function getSkillUnlocks(skill){
  const rows = [];
  if(RESOURCES[skill]){
    RESOURCES[skill].forEach(r=> rows.push({level:r.level, name:r.name, type:`Gather &middot; +${r.xp}xp`}));
  }
  if(RECIPES[skill]){
    RECIPES[skill].forEach(r=>{
      const outQty = r.outputQty && r.outputQty>1 ? ` (x${r.outputQty})` : '';
      rows.push({level:r.level, name:r.name+outQty, type:`Craft &middot; +${r.xp}xp`});
    });
  }
  if(skill==='prayer'){
    PRAYERS.forEach(p=> rows.push({level:p.level, name:p.name, type:p.desc}));
  }
  Object.entries(ITEMS).filter(([id])=>!id.includes('+')).forEach(([id,it])=>{
    if(it.reqSkill===skill){
      const slotLabel = it.slot==='quiver'? 'Ammo' : it.slot==='shield'? 'Shield' : it.slot==='armor'? 'Armor' : it.slot==='amulet'? 'Amulet' : 'Weapon';
      rows.push({level:it.reqLevel, name:it.name, type:`Equip (${slotLabel})`});
    }
    if(it.tool){
      if(it.weaponReqSkill===skill) rows.push({level:it.weaponReqLevel, name:it.name, type:'Equip as Weapon'});
      if(it.toolReqSkill===skill) rows.push({level:it.toolReqLevel, name:it.name, type:'Add to Tool Belt'});
    }
  });
  rows.sort((a,b)=>a.level-b.level);
  return rows;
}

  if(!loc.monsters || loc.monsters.length===0) return '';
  return `
    <h3 style="font-size:1rem;color:var(--blood-bright);margin:${topMargin||'0'} 0 10px;">Creatures nearby</h3>
    ${loc.monsters.map(m=>`
      <div class="monster-card">
        <div class="monster-top"><h4>${m.name}</h4><span class="lv">Lv. ${m.level}</span></div>
        <div class="monster-stats"><span>HP ${m.hp}</span><span>Atk ${m.attack}</span><span>Def ${m.defence}</span></div>
        <button class="btn stop" data-fight="${areaId}|${m.id}">Engage</button>
      </div>
    `).join('')}
  `;
}

function townHtml(){
  const remaining = restCooldownRemaining();
  const onCooldown = remaining > 0;
  const mins = Math.ceil(remaining/60000);
  const altarRemaining = altarCooldownRemaining();
  const altarOnCooldown = altarRemaining > 0;
  const altarMins = Math.ceil(altarRemaining/60000);
  return `
    <div class="card">
      <h3 class="area-title">Hollowmere Town</h3>
      <p class="area-desc">${AREAS.town.desc} Visit the Craft and Shop tabs above to work the furnace, cookhouse, fletcher's bench, or armoury.</p>
      <button class="btn" ${onCooldown?'disabled':''} data-rest="1">${onCooldown? `Resting (ready in ${mins}m)` : 'Rest to heal'}</button>
      <button class="btn" style="margin-left:8px;" ${altarOnCooldown?'disabled':''} data-pray-altar="1">${altarOnCooldown? `Altar recharging (${altarMins}m)` : 'Pray at the Altar (restore prayer)'}</button>
    </div>
    <div class="card">
      <h3 class="area-title">Townsfolk</h3>
      <p class="area-desc">A few familiar faces might help a new adventurer get on their feet.</p>
      <div class="shop-item">
        <div><div><b>The Blacksmith</b></div><div class="req" style="font-size:0.72rem;color:var(--parch-dim);">${state.quests.blacksmithPickaxe==='complete'?'Quest complete':state.quests.blacksmithPickaxe==='active'?'Owes him 10 Copper Ore + 10 Tin Ore':'Has a pickaxe to lend'}</div></div>
        <button class="btn small" data-talknpc="blacksmith">Talk</button>
      </div>
      <div class="shop-item">
        <div><div><b>The Lumberjack</b></div><div class="req" style="font-size:0.72rem;color:var(--parch-dim);">${state.quests.lumberjackAxe==='complete'?'Quest complete':state.quests.lumberjackAxe==='active'?'Owes him 10 Logs':'Has an axe to lend'}</div></div>
        <button class="btn small" data-talknpc="lumberjack">Talk</button>
      </div>
    </div>
    <div class="card">
      ${monsterListHtml('town','0')}
    </div>
  `;
}

function fightHtml(){
  const m = fight.def;
  const finished = fight.finished;
  return `
    <div class="fight-box">
      <div class="fight-vs">
        <div class="fight-side">
          <h4>You</h4>
          <div class="bar"><div class="bar-fill hp" style="width:${(state.currentHp/maxHp()*100)}%"></div></div>
          <div style="font-size:0.75rem;color:var(--parch-dim);margin-top:3px;">${state.currentHp} / ${maxHp()} HP</div>
          <div class="bar" style="margin-top:6px;"><div class="bar-fill prayer" style="width:${(maxPrayer()>0?state.currentPrayer/maxPrayer()*100:0)}%"></div></div>
          <div style="font-size:0.75rem;color:var(--parch-dim);margin-top:3px;">${state.currentPrayer} / ${maxPrayer()} Prayer</div>
        </div>
        <div class="fight-side">
          <h4>${m.name} <span style="color:var(--blood-bright);font-size:0.75rem;">Lv.${m.level}</span></h4>
          <div class="bar"><div class="bar-fill mon" style="width:${(fight.hp/fight.maxHp*100)}%"></div></div>
          <div style="font-size:0.75rem;color:var(--parch-dim);margin-top:3px;">${Math.max(0,fight.hp)} / ${fight.maxHp} HP</div>
        </div>
      </div>
      ${finished
        ? `<div style="color:var(--forest);font-weight:600;margin-bottom:10px;">&#9733; Victory! The ${m.name} has been defeated.</div>
           <div style="display:flex;gap:8px;flex-wrap:wrap;">
             <button class="btn" data-fightagain="1">Fight ${m.name} Again</button>
             <button class="btn stop" data-leavecombat="1">Leave Combat</button>
           </div>`
        : `<button class="btn stop" data-flee="1">Flee</button>`}
    </div>
    <div class="card">
      ${quickUseHtml()}
      ${combatStyleControlsHtml()}
      ${prayerControlsHtml()}
    </div>
  `;
}

function inventoryHtml(){
  const entries = Object.entries(state.inventory);
  return `
    <div class="card">
      <h3 class="area-title">Inventory</h3>
      <p class="area-desc" style="margin-bottom:14px;">Head to the Shop's Sell tab to turn items into gold, or the Workshop's Upgrade Forge to improve your gear.</p>
      ${entries.length===0? '<div class="empty">Your pack is empty. Go gather some resources.</div>' : `
      <div>
        ${entries.map(([id,qty])=>{
          const it = ITEMS[id];
          let reqTxt = '';
          if(it.tool){
            reqTxt = ` &middot; weapon: ${SKILL_LABEL[it.weaponReqSkill]} ${it.weaponReqLevel} &middot; belt: ${SKILL_LABEL[it.toolReqSkill]} ${it.toolReqLevel}`;
          } else if(it.reqSkill){
            reqTxt = ` &middot; requires ${SKILL_LABEL[it.reqSkill]} ${it.reqLevel}`;
          }
          const meets = meetsRequirement(id);
          const meetsWeapon = !it.weaponReqSkill || getLevel(it.weaponReqSkill) >= it.weaponReqLevel;
          const meetsTool = !it.toolReqSkill || getLevel(it.toolReqSkill) >= it.toolReqLevel;
          return `<div class="recipe">
            <span>${it.name} <span class="qty">x${qty}</span> &middot; ${it.sell||0}g each${reqTxt}</span>
            <div class="inv-actions">
              ${it.tool? `<button class="btn small" ${meetsWeapon?'':'disabled'} data-equipweapon="${id}">Equip as Weapon</button><button class="btn small" ${meetsTool?'':'disabled'} data-equipbelt="${id}">Add to Tool Belt</button>` : ''}
              ${it.slot? `<button class="btn small" ${meets?'':'disabled'} data-equip="${id}">${it.slot==='quiver'?'Nock':'Equip'}</button>`:''}
              ${(it.heal||it.prayerRestore)? `<button class="btn small" data-use="${id}">${it.drink?'Drink':'Eat'}</button>`:''}
              ${it.buryXp? `<button class="btn small" data-bury="${id}">Bury (+${it.buryXp} Prayer xp)</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>
  `;
}

function equippedGearHtml(){
  const slots = [
    {key:'weapon', label:'Weapon'},
    {key:'armor', label:'Armor'},
    {key:'shield', label:'Shield'},
    {key:'amulet', label:'Amulet'},
    {key:'quiver', label:'Quiver'},
    {key:'toolbeltAxe', label:'Tool Belt: Axe'},
    {key:'toolbeltPickaxe', label:'Tool Belt: Pickaxe'},
  ];
  function statsTxt(it){
    const parts=[];
    if(it.atk) parts.push(`+${it.atk} Atk`);
    if(it.str) parts.push(`+${it.str} Str`);
    if(it.def) parts.push(`+${it.def} Def`);
    return parts.join(' / ');
  }
  return `
    <div class="card">
      <h3 class="area-title">Equipped Gear</h3>
      <p class="area-desc">Unequip anything here to send it back to your Inventory &mdash; handy before heading to the Workshop's Upgrade Forge.</p>
      ${slots.map(s=>{
        const id = state.equipment[s.key];
        const it = id ? ITEMS[id] : null;
        const extra = it ? (s.key==='quiver' ? ` &middot; ${state.inventory[id]||0} in reserve` : (statsTxt(it) ? ` &middot; ${statsTxt(it)}` : '')) : '';
        return `<div class="shop-item">
          <div><div><b>${s.label}</b></div>
          <div class="req" style="font-size:0.72rem;color:var(--parch-dim);">${it ? `${it.name}${extra}` : 'Nothing equipped'}</div></div>
          ${it ? `<button class="btn small stop" data-unequip="${s.key}">Unequip</button>` : ''}
        </div>`;
      }).join('')}
    </div>
  `;
}

function craftHtml(){
  return [
    collapsibleCard('smithing', 'Furnace &mdash; Smithing', recipeListHtml('smithing')),
    collapsibleCard('cooking', 'Cookhouse &mdash; Cooking', recipeListHtml('cooking')),
    collapsibleCard('fletching', "Fletcher's Bench &mdash; Fletching", recipeListHtml('fletching')),
    collapsibleCard('crafting', 'Workbench &mdash; Crafting', recipeListHtml('crafting')),
    collapsibleCard('upgrade', 'Upgrade Forge', upgradeForgeHtml()),
  ].join('');
}
function upgradeForgeHtml(){
  const entries = Object.entries(state.inventory).filter(([id])=>isUpgradable(id));
  if(entries.length===0){
    return `<p class="area-desc">You don't have any upgradable gear in your Inventory right now. Unequip something from Equipped Gear, or bring an item back from the field.</p>`;
  }
  return `
    <p class="area-desc">Spend bars and gold to push a weapon, shield, or armor piece up to +5.</p>
    ${entries.map(([id,qty])=>{
      const it = ITEMS[id];
      const {baseId, plus} = getBaseIdAndPlus(id);
      let actionHtml;
      if(plus>=5){
        actionHtml = `<span style="font-size:0.75rem;color:var(--gold);">MAX +5</span>`;
      } else {
        const cost = upgradeCost(baseId, plus+1);
        const canAfford = (!cost.barId || (state.inventory[cost.barId]||0)>=cost.barQty) && state.gold>=cost.gold;
        const costTxt = `${cost.barId? `${cost.barQty}x ${ITEMS[cost.barId].name} + `:''}${cost.gold}g`;
        actionHtml = `<button class="btn small gold" ${canAfford?'':'disabled'} data-upgrade="${id}">Upgrade to +${plus+1} (${costTxt})</button>`;
      }
      return `<div class="recipe">
        <span>${it.name} <span class="qty">x${qty}</span></span>
        ${actionHtml}
      </div>`;
    }).join('')}
  `;
}
function recipeListHtml(cat){
  const lvl = getLevel(cat);
  return RECIPES[cat].map(r=>{
    const locked = lvl < r.level;
    const maxable = maxCraftable(r);
    const noMats = maxable<=0;
    const busy = !!activeCraft;
    const isActive = activeCraft && activeCraft.category===cat && activeCraft.recipeId===r.id;
    const needTxt = Object.entries(r.need).map(([id,q])=>`${q}x ${ITEMS[id].name}`).join(', ');
    const goldTxt = r.goldCost? ` + ${r.goldCost}g` : '';
    const makesTxt = r.outputQty && r.outputQty>1 ? ` &middot; makes ${r.outputQty}x` : '';
    const disabledAttr = (locked||noMats||(busy&&!isActive))?'disabled':'';
    return `<div class="recipe ${locked?'locked':''}" style="align-items:flex-start;">
      <div><div>${r.name}</div><div class="req">Lv.${r.level} &middot; needs ${needTxt}${goldTxt} &middot; +${r.xp}xp &middot; ${r.time}s each${makesTxt} &middot; have ${maxable} makeable</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        ${isActive ? `
          <div style="width:170px;">
            <div class="bar"><div class="bar-fill xp" id="craft-progress-fill" style="width:${(activeCraft.elapsed/(activeCraft.timePerItem*1000)*100)}%"></div></div>
            <div id="craft-progress-text" style="font-size:0.65rem;color:var(--parch-dim);text-align:right;margin-top:2px;">${activeCraft.qtyDone} / ${activeCraft.qtyTotal} made</div>
          </div>
          <button class="btn small stop" data-cancelcraft="1">Cancel</button>
        ` : `
          <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
            <button class="btn small" ${disabledAttr} data-craft="${cat}|${r.id}|1">x1</button>
            <button class="btn small" ${disabledAttr} data-craft="${cat}|${r.id}|5">x5</button>
            <button class="btn small" ${disabledAttr} data-craft="${cat}|${r.id}|10">x10</button>
            <button class="btn small" ${disabledAttr} data-craft="${cat}|${r.id}|all">All (${maxable})</button>
          </div>
          <div style="display:flex;gap:4px;">
            <input type="number" min="1" placeholder="#" ${disabledAttr} style="width:56px;background:#0d0b09;border:1px solid var(--line);color:var(--parch);border-radius:4px;padding:4px 6px;font-size:0.75rem;" id="qty-${cat}-${r.id}">
            <button class="btn small gold" ${disabledAttr} data-craftcustom="${cat}|${r.id}">Go</button>
          </div>
        `}
      </div>
    </div>`;
  }).join('');
}

function shopHtml(){
  return `
    <div class="tabs" style="margin-bottom:14px;">
      <div class="tab ${shopMode==='buy'?'active':''}" data-shopmode="buy">Buy</div>
      <div class="tab ${shopMode==='sell'?'active':''}" data-shopmode="sell">Sell</div>
    </div>
    ${shopMode==='sell' ? sellShopHtml() : buyShopHtml()}
  `;
}
function buyShopHtml(){
  const gearItems = SHOP.filter(s=>s.type==='amulet');
  const potionItems = SHOP.filter(s=>s.type==='potion');
  const foodItems = SHOP.filter(s=>s.type==='food');

  function bonusTxt(id){
    const it = ITEMS[id];
    return ['atk','str','def'].filter(k=>it[k]).map(k=>`+${it[k]} ${k==='atk'?'Atk':k==='str'?'Str':'Def'}`).join(' / ');
  }
  function renderGear(s){
    const owned = state.equipment[s.type]===s.id;
    const locked = state.gold < s.price;
    return `<div class="shop-item">
      <div><div><b>${s.name}</b> ${owned?'<span style="color:var(--forest);font-size:0.75rem;">(equipped)</span>':''}</div>
      <div class="req" style="font-size:0.72rem;color:var(--parch-dim);">${s.price}g &middot; ${bonusTxt(s.id)}</div></div>
      ${owned? `<button class="btn small stop" data-unequip="${s.type}">Unequip</button>` : `<button class="btn small gold" ${locked?'disabled':''} data-buy="${s.id}">Buy &amp; Equip</button>`}
    </div>`;
  }
  function renderConsumable(s){
    const locked = state.gold < s.price;
    const have = state.inventory[s.id]||0;
    const it = ITEMS[s.id];
    const effectTxt = it.heal? `Heals ${it.heal} HP` : it.prayerRestore? `Restores ${it.prayerRestore} Prayer` : '';
    return `<div class="shop-item">
      <div><div><b>${s.name}</b> ${have? `<span style="color:var(--gold);font-size:0.75rem;">(have ${have})</span>`:''}</div>
      <div class="req" style="font-size:0.72rem;color:var(--parch-dim);">${s.price}g &middot; ${effectTxt}</div></div>
      <button class="btn small gold" ${locked?'disabled':''} data-buy="${s.id}">Buy</button>
    </div>`;
  }
  return `
    <div class="card">
      <h3 class="area-title">Amulets</h3>
      ${gearItems.map(renderGear).join('')}
    </div>
    <div class="card">
      <h3 class="area-title">Potions</h3>
      ${potionItems.map(renderConsumable).join('')}
    </div>
    <div class="card">
      <h3 class="area-title">Food</h3>
      ${foodItems.map(renderConsumable).join('')}
    </div>
  `;
}
function sellShopHtml(){
  const entries = Object.entries(state.inventory);
  const totalValue = entries.reduce((sum,[id,qty])=>sum+(ITEMS[id].sell||0)*qty, 0);
  if(entries.length===0){
    return `<div class="card"><h3 class="area-title">Sell</h3><div class="empty">Your pack is empty &mdash; nothing to sell.</div></div>`;
  }
  return `
    <div class="card">
      <h3 class="area-title">Sell</h3>
      <p class="area-desc">Total inventory value: <b style="color:var(--gold-bright);font-style:normal;">${totalValue}g</b></p>
      ${entries.map(([id,qty])=>{
        const price = ITEMS[id].sell||0;
        return `<div class="recipe" style="align-items:flex-start;">
          <div><div>${ITEMS[id].name}</div><div class="req">x${qty} held &middot; ${price}g each</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;">
              <button class="btn small" data-sellqty="${id}|1">x1</button>
              <button class="btn small" ${qty<5?'disabled':''} data-sellqty="${id}|5">x5</button>
              <button class="btn small" ${qty<10?'disabled':''} data-sellqty="${id}|10">x10</button>
              <button class="btn small" data-sellqty="${id}|all">All (${qty})</button>
            </div>
            <div style="display:flex;gap:4px;">
              <input type="number" min="1" placeholder="#" style="width:56px;background:#0d0b09;border:1px solid var(--line);color:var(--parch);border-radius:4px;padding:4px 6px;font-size:0.75rem;" id="sellqty-${id}">
              <button class="btn small gold" data-sellcustom="${id}">Go</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>setTab(el.dataset.tab));
  document.querySelectorAll('[data-travel]').forEach(el=>el.onclick=()=>travelTo(el.dataset.travel));
  document.querySelectorAll('[data-gather]').forEach(el=>el.onclick=()=>{
    const [skill,resId] = el.dataset.gather.split('|');
    const res = RESOURCES[skill].find(r=>r.id===resId);
    startGather(skill,res);
  });
  document.querySelectorAll('[data-stopgather]').forEach(el=>el.onclick=stopGather);
  document.querySelectorAll('[data-fight]').forEach(el=>el.onclick=()=>{
    const [areaId,monId] = el.dataset.fight.split('|');
    const mon = AREAS[areaId].monsters.find(m=>m.id===monId);
    startFight(areaId, Object.assign({},mon));
  });
  document.querySelectorAll('[data-flee]').forEach(el=>el.onclick=fleeFight);
  document.querySelectorAll('[data-fightagain]').forEach(el=>el.onclick=fightAgain);
  document.querySelectorAll('[data-leavecombat]').forEach(el=>el.onclick=leaveCombat);
  document.querySelectorAll('[data-craft]').forEach(el=>el.onclick=()=>{
    const [cat,id,qty] = el.dataset.craft.split('|');
    startCraft(cat, id, qty==='all' ? 'all' : parseInt(qty,10));
  });
  document.querySelectorAll('[data-craftcustom]').forEach(el=>el.onclick=()=>{
    const [cat,id] = el.dataset.craftcustom.split('|');
    const input = document.getElementById(`qty-${cat}-${id}`);
    let qty = parseInt(input && input.value, 10);
    if(!qty || qty<1) qty = 1;
    startCraft(cat, id, qty);
  });
  document.querySelectorAll('[data-cancelcraft]').forEach(el=>el.onclick=stopCraft);
  document.querySelectorAll('[data-sellqty]').forEach(el=>el.onclick=()=>{
    const [id,qty] = el.dataset.sellqty.split('|');
    sellQty(id, qty==='all' ? 'all' : parseInt(qty,10));
  });
  document.querySelectorAll('[data-sellcustom]').forEach(el=>el.onclick=()=>{
    const id = el.dataset.sellcustom;
    const input = document.getElementById(`sellqty-${id}`);
    let qty = parseInt(input && input.value, 10);
    if(!qty || qty<1) qty = 1;
    sellQty(id, qty);
  });
  document.querySelectorAll('[data-shopmode]').forEach(el=>el.onclick=()=>setShopMode(el.dataset.shopmode));
  document.querySelectorAll('[data-collapse]').forEach(el=>el.onclick=()=>toggleSection(el.dataset.collapse));
  document.querySelectorAll('[data-use]').forEach(el=>el.onclick=()=>useConsumable(el.dataset.use));
  document.querySelectorAll('[data-equip]').forEach(el=>el.onclick=()=>equipFromInventory(el.dataset.equip));
  document.querySelectorAll('[data-equipweapon]').forEach(el=>el.onclick=()=>equipToolAsWeapon(el.dataset.equipweapon));
  document.querySelectorAll('[data-equipbelt]').forEach(el=>el.onclick=()=>equipToolToBelt(el.dataset.equipbelt));
  document.querySelectorAll('[data-upgrade]').forEach(el=>el.onclick=()=>upgradeItem(el.dataset.upgrade));
  document.querySelectorAll('[data-bury]').forEach(el=>el.onclick=()=>buryItem(el.dataset.bury));
  document.querySelectorAll('[data-buy]').forEach(el=>el.onclick=()=>buyItem(SHOP.find(s=>s.id===el.dataset.buy)));
  document.querySelectorAll('[data-unequip]').forEach(el=>el.onclick=()=>unequip(el.dataset.unequip));
  document.querySelectorAll('[data-prayer]').forEach(el=>el.onclick=()=>togglePrayer(el.dataset.prayer));
  document.querySelectorAll('[data-combatstyle]').forEach(el=>el.onclick=()=>setCombatStyle(el.dataset.combatstyle));
  document.querySelectorAll('[data-rest]').forEach(el=>el.onclick=restToHeal);
  document.querySelectorAll('[data-pray-altar]').forEach(el=>el.onclick=prayAtAltar);
  document.querySelectorAll('[data-switch]').forEach(el=>el.onclick=switchCharacter);
  document.querySelectorAll('[data-skillguide]').forEach(el=>el.onclick=()=>openSkillGuide(el.dataset.skillguide));
  document.querySelectorAll('[data-closeguide]').forEach(el=>el.onclick=closeSkillGuide);
  document.querySelectorAll('[data-talknpc]').forEach(el=>el.onclick=()=>openNpcDialogue(el.dataset.talknpc));
  document.querySelectorAll('[data-closenpc]').forEach(el=>el.onclick=closeNpcDialogue);
  document.querySelectorAll('[data-questaction]').forEach(el=>el.onclick=()=>questAction(el.dataset.questaction));
}

// ---------- INIT ----------
(async ()=>{
  await loadProfiles();
  appState = 'login';
  render();
})();
</script>
</body>
</html>
